services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_ORIGINS=https://ollama.s3an.dev,https://chat.s3an.dev
      - OLLAMA_FLASH_ATTENTION=1  # KVキャッシュのメモリ使用量を削減
    volumes:
      - ./data:/root/.ollama                    # モデルデータ永続化
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]               # All GPU passthrough
    networks:
      - ollama_net
    restart: always

  open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: open-webui
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434     # ollama_net経由で内部接続
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}    # セッション暗号化キー
    volumes:
      - ./webui-data:/app/backend/data          # ユーザー・履歴・設定の永続化
    depends_on:
      - ollama
    security_opt:
      - no-new-privileges:true
    networks:
      - ollama_net                              # Ollamaへの接続
      - proxy_net                               # NPMからのアクセス
    restart: always

networks:
  ollama_net:
    external: true
  proxy_net:
    external: true
