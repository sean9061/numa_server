<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Numa Monitor</title>
    <style>
      /* Header responsive — applied globally since Tailwind can't target #header-meta easily */
      @media (max-width: 900px)  { #header-meta { display: none !important; } }
      @media (max-width: 640px)  {
        #server-controls { display: none !important; }
        .header-brand-text { display: none; }
        #clock { display: none; }
      }

      /* State badges */
      .svc-state-badge {
        font-size: 9px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
        padding: 2px 6px; border-radius: 4px; flex-shrink: 0;
      }
      .svc-state-badge.running { background: rgba(34,197,94,0.15);  color: #22c55e; }
      .svc-state-badge.exited  { background: rgba(239,68,68,0.15);  color: #ef4444; }
      .svc-state-badge.paused  { background: rgba(245,158,11,0.15); color: #f59e0b; }
      .svc-state-badge.other   { background: rgba(78,98,130,0.15);  color: #666666; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
