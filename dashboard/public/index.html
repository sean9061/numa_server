<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Numa Monitor</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #111111;
      --surface:  #1c1c1c;
      --surface2: #252525;
      --border:   #2e2e2e;
      --text:     #e0e0e0;
      --dim:      #666666;
      --blue:     #4a9eff;
      --green:    #22c55e;
      --amber:    #f59e0b;
      --red:      #ef4444;
      --purple:   #9b8ffc;
      --gap:      6px;
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 13px; }

    /* ── Header (fixed) ── */
    #header {
      position: fixed; top: 6px; left: 6px; right: 6px; height: 48px; z-index: 100;
      display: flex; align-items: center;
      padding: 0 12px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      gap: 16px;
    }
    .header-brand { display: flex; align-items: center; gap: 8px; font-weight: 700;
      font-size: 14px; letter-spacing: -0.01em; color: var(--blue); flex-shrink: 0; }
    .header-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
    .header-stat { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
    .header-stat-label { color: var(--dim); font-size: 11px; }
    .header-stat-val   { color: var(--text); font-size: 12px; font-weight: 500; }
    .header-spacer { flex: 1; }
    #clock { font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums; }
    .btn-logout { padding: 5px 12px; border: 1px solid var(--border); border-radius: 6px;
      background: transparent; color: var(--dim); font-size: 12px; cursor: pointer;
      transition: color 0.15s, border-color 0.15s; }
    .btn-logout:hover { color: var(--red); border-color: var(--red); }
    .time-range { display: flex; gap: 3px; }
    .tr-btn { padding: 4px 9px; border-radius: 5px; font-size: 11px; font-weight: 500;
      cursor: pointer; background: transparent; border: 1px solid var(--border); color: var(--dim);
      transition: all 0.15s; }
    .tr-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }
    .tr-btn:not(.active):hover { border-color: var(--blue); color: var(--text); }
    .ws-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); transition: background 0.3s; }
    .ws-dot.connected { background: var(--green); }
    .ws-label { font-size: 11px; color: var(--dim); }

    /* ── Panel toggle ── */
    .panel-toggle { display: flex; gap: 3px; }
    .pt-btn {
      width: 30px; height: 26px; padding: 0;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px; cursor: pointer;
      background: transparent; border: 1px solid var(--border); color: var(--dim);
      transition: all 0.15s;
    }
    .pt-btn.active { background: var(--surface2); border-color: var(--blue); color: var(--blue); }
    .pt-btn:not(.active):hover { border-color: var(--dim); color: var(--text); }

    /* Fit-all button */
    .btn-fit {
      padding: 5px 10px; border: 1px solid var(--border); border-radius: 6px;
      background: transparent; color: var(--dim); font-size: 12px; cursor: pointer;
      transition: color 0.15s, border-color 0.15s; line-height: 1;
    }
    .btn-fit:hover { color: var(--text); border-color: var(--dim); }

    /* ── Shared content area ── */
    #content {
      position: fixed;
      top: 60px; left: 0; right: 0; bottom: 0;
    }

    /* ── Canvas viewport (server panel) ── */
    #viewport {
      position: absolute; inset: 0;
      overflow: hidden;
      background: var(--bg);
      cursor: grab;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    #viewport.is-dragging { cursor: grabbing; }

    /* ── Services panel ── */
    #panel-services {
      position: absolute; inset: 0;
      display: none;
      flex-direction: column;
      padding: 6px;
      gap: 6px;
      overflow: hidden;
      background: var(--bg);
    }

    /* Subtle dot-grid background */
    #viewport::before {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, #2e2e2e 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    /* ── Infinite canvas ── */
    #canvas {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
      will-change: transform;
    }

    /* ── Tile: absolutely-positioned slot on canvas ── */
    .tile { position: absolute; }

    /* ── Section separator label ── */
    .section-divider {
      position: absolute;
      display: flex; align-items: center; gap: 12px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--dim);
    }
    .section-divider::after {
      content: '';
      height: 1px; background: var(--border); flex: 1; min-width: 60px;
    }

    /* ── Card base ── */
    .card {
      width: 100%; height: 100%;
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 12px; display: flex; flex-direction: column; overflow: hidden;
    }
    .card-title { font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--dim); flex-shrink: 0; }

    /* ── Metric card (gauge + sparkline) ── */
    .metric-body {
      flex: 1; min-height: 0;
      display: flex; gap: 6px; align-items: stretch;
      margin-top: 4px;
    }
    .metric-gauge {
      width: 88px; flex-shrink: 0;
      position: relative; align-self: center;
    }
    .gauge-svg { width: 100%; display: block; overflow: visible; }
    .gauge-track     { fill: none; stroke: var(--border); stroke-width: 10; stroke-linecap: round; }
    .gauge-indicator { fill: none; stroke-width: 10; stroke-linecap: round;
      transition: stroke-dasharray 0.5s ease, stroke 0.3s; }
    .gauge-center-text {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -44%);
      text-align: center; pointer-events: none;
    }
    .gauge-pct  { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; }
    .gauge-sub  { font-size: 9px; color: var(--dim); margin-top: 1px; }

    .metric-chart { flex: 1; min-width: 0; position: relative; }

    .metric-meta {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-top: 4px; flex-shrink: 0;
    }
    .meta-pill { display: flex; align-items: center; gap: 3px; font-size: 10px; color: var(--dim); }
    .meta-pill span { color: var(--text); font-weight: 500; }

    /* ── CPU core grid ── */
    .core-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px 5px;
      margin-top: 4px; flex-shrink: 0; }
    .core-item { display: flex; align-items: center; gap: 3px; }
    .core-label { font-size: 8px; color: var(--dim); width: 12px; flex-shrink: 0; }
    .core-track { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .core-fill  { height: 100%; border-radius: 2px; background: var(--blue);
      transition: width 0.4s ease, background 0.3s; }
    .core-pct   { font-size: 8px; color: var(--dim); width: 22px; text-align: right; flex-shrink: 0;
      font-variant-numeric: tabular-nums; }

    /* ── Combined GPU card ── */
    .gpu-section { flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 2px; }
    .gpu-divider { height: 1px; background: var(--border); flex-shrink: 0; margin: 2px 0; }
    .gpu-section-header { display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .gpu-section-title { font-size: 10px; font-weight: 700; color: var(--text); }
    .gpu-section-meta  { font-size: 10px; color: var(--dim); }
    .gpu-section-body  { flex: 1; min-height: 0; display: flex; gap: 6px; align-items: stretch; }
    .gpu-pct-big { font-size: 20px; font-weight: 700; width: 44px; flex-shrink: 0;
      text-align: center; font-variant-numeric: tabular-nums; align-self: center; }
    .gpu-charts { flex: 1; min-width: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    .gpu-chart-wrap { display: flex; flex-direction: column; min-height: 0; }
    .gpu-chart-label { font-size: 8px; color: var(--dim); flex-shrink: 0; margin-bottom: 1px; }
    .gpu-chart-canvas { flex: 1; min-height: 0; position: relative; }

    /* ── Disk I/O ── */
    .disk-io-chart-wrap { height: 36px; position: relative; margin-top: 4px; flex-shrink: 0; }
    .disk-io { display: flex; justify-content: center; gap: 16px; flex-shrink: 0; margin-top: 3px; }
    .disk-io-item { font-size: 10px; color: var(--dim); }
    .disk-io-item span { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }

    /* ── Network card ── */
    .net-chart-wrap { flex: 1; min-height: 0; position: relative; margin-top: 6px; }
    .net-stats { display: flex; gap: 14px; flex-shrink: 0; margin-top: 5px; }
    .net-stat { display: flex; align-items: center; gap: 4px; font-size: 11px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-rx { background: var(--blue); }
    .dot-tx { background: var(--purple); }
    .net-val { font-weight: 600; font-variant-numeric: tabular-nums; }
    .net-label { color: var(--dim); font-size: 10px; }

    /* ── Disk card (donut) ── */
    .disk-donut-wrap { flex: 1; min-height: 0; position: relative; margin-top: 4px; }
    .disk-donut-center {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center; pointer-events: none;
    }
    .disk-donut-pct { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; }
    .disk-donut-sub { font-size: 9px; color: var(--dim); margin-top: 2px; }
    .disk-legend { display: flex; flex-direction: column; gap: 3px; margin-top: 5px; flex-shrink: 0; }
    .disk-legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; }
    .disk-legend-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .disk-legend-mount { color: var(--text); flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .disk-legend-val { color: var(--dim); font-variant-numeric: tabular-nums; flex-shrink: 0; }
    .disk-legend-pct { font-size: 9px; font-weight: 600; font-variant-numeric: tabular-nums;
      flex-shrink: 0; margin-left: 3px; }

    /* ── Power card ── */
    .power-chart-wrap { flex: 1; min-height: 0; position: relative; margin-top: 4px; }
    .power-total { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums;
      color: var(--text); margin-top: 4px; flex-shrink: 0; }
    .power-legend { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; flex-shrink: 0; }
    .power-legend-item { display: flex; align-items: center; gap: 3px; font-size: 10px; }
    .power-legend-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .power-legend-label { color: var(--dim); }
    .power-legend-val { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }

    /* ── Load card ── */
    .load-grid { flex: 1; display: flex; flex-direction: column; justify-content: space-evenly;
      margin-top: 6px; }
    .load-row { display: flex; align-items: center; justify-content: space-between; }
    .load-label { color: var(--dim); font-size: 11px; }
    .load-val   { font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .load-divider { height: 1px; background: var(--border); margin: 2px 0; }

    /* ── State badge (shared) ── */
    .svc-state-badge {
      font-size: 9px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
      padding: 2px 6px; border-radius: 4px; flex-shrink: 0;
    }
    .svc-state-badge.running { background: rgba(34,197,94,0.15);  color: var(--green); }
    .svc-state-badge.exited  { background: rgba(239,68,68,0.15);  color: var(--red); }
    .svc-state-badge.paused  { background: rgba(245,158,11,0.15); color: var(--amber); }
    .svc-state-badge.other   { background: rgba(78,98,130,0.15);  color: var(--dim); }

    /* ── Open link button ── */
    .svc-link-btn {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 3px 8px; border-radius: 5px; font-size: 10px; font-weight: 600;
      text-decoration: none;
      background: rgba(59,130,246,0.10); border: 1px solid rgba(59,130,246,0.3);
      color: var(--blue); transition: all 0.15s;
    }
    .svc-link-btn:hover { background: rgba(59,130,246,0.22); border-color: var(--blue); }

    .svc-grid {
      flex: 1; min-height: 0;
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
      gap: var(--gap);
      align-content: start;
    }

    /* ── Service card ── */
    .svc2-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 18px 20px; display: flex; flex-direction: column; gap: 14px;
      transition: border-color 0.15s;
    }
    .svc2-card:hover { border-color: rgba(74,158,255,0.35); }
    .svc2-card .status-dot { width: 9px; height: 9px; }
    .svc2-card .svc-state-badge { font-size: 10px; padding: 3px 8px; }

    .svc2-header { display: flex; align-items: center; gap: 10px; }
    .svc2-name {
      font-size: 15px; font-weight: 700; flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .svc2-meta {
      font-size: 11px; color: var(--dim);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .svc2-bars { display: flex; flex-direction: column; gap: 9px; }
    .svc2-bar-row { display: flex; align-items: center; gap: 10px; }
    .svc2-bar-label { font-size: 10px; color: var(--dim); width: 34px; flex-shrink: 0; }
    .svc2-bar-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .svc2-bar-fill  { height: 100%; border-radius: 3px; transition: width 0.4s ease, background 0.3s; }
    .svc2-bar-val   {
      font-size: 11px; color: var(--dim); width: 110px; text-align: right; flex-shrink: 0;
      font-variant-numeric: tabular-nums; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .svc2-disk-io {
      flex: 1; font-size: 11px; color: var(--dim); text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .svc2-disk-io span { color: var(--text); font-weight: 500; }

    .svc2-web-stats {
      display: flex; align-items: center; gap: 12px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 7px; padding: 8px 14px;
    }
    .svc2-web-stat { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .svc2-web-val  { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--green); }
    .svc2-web-label { font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.05em; }
    .svc2-web-sep  { width: 1px; height: 28px; background: var(--border); }

    .svc2-actions { display: flex; align-items: center; gap: 6px; }
    .svc2-spacer  { flex: 1; }

    .svc2-ctrl-btn {
      width: 34px; height: 30px; padding: 0;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px; cursor: pointer;
      background: transparent; border: 1px solid var(--border); color: var(--dim);
      transition: all 0.15s;
    }
    .svc2-ctrl-btn:hover:not(:disabled) { border-color: var(--blue); color: var(--text); }
    .svc2-ctrl-btn:disabled { opacity: 0.28; cursor: default; }

    .svc2-log-btn {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 600;
      cursor: pointer; background: transparent;
      border: 1px solid var(--border); color: var(--dim); transition: all 0.15s;
    }
    .svc2-log-btn:hover, .svc2-log-btn.active {
      background: rgba(74,158,255,0.10); border-color: rgba(74,158,255,0.4); color: var(--blue);
    }

    /* ── Log drawer (flex child inside services panel) ── */
    #svc-log-drawer {
      height: 185px;
      flex-shrink: 0;
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      flex-direction: column; overflow: hidden;
    }
    .svc-log-drawer-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .svc-log-drawer-title {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--dim);
    }
    .svc-log-close {
      background: transparent; border: none; color: var(--dim); cursor: pointer;
      font-size: 15px; line-height: 1; padding: 0 2px; transition: color 0.15s;
    }
    .svc-log-close:hover { color: var(--red); }
    .log-view {
      flex: 1; min-height: 0; overflow-y: auto;
      font-family: 'JetBrains Mono','Fira Code',monospace; font-size: 11px; line-height: 1.5;
      background: var(--bg); padding: 7px 9px;
      touch-action: pan-y;
    }
    .log-line { color: var(--dim); white-space: pre-wrap; word-break: break-all; }
    .log-line.err { color: #f87171; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Utility ── */
    .color-ok   { color: var(--green); }
    .color-warn { color: var(--amber); }
    .color-crit { color: var(--red); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .status-running { background: var(--green); box-shadow: 0 0 5px var(--green); }
    .status-exited  { background: var(--red); }
    .status-paused  { background: var(--amber); }
    .status-other   { background: var(--dim); }
  </style>
</head>
<body>

  <!-- Fixed header -->
  <div id="header">
    <div class="header-brand">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8m-4-4v4"/>
      </svg>
      NUMA MONITOR
    </div>
    <div class="header-sep"></div>
    <div class="panel-toggle">
      <button class="pt-btn active" id="pt-server" data-panel="server" title="Server Monitor">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </button>
      <button class="pt-btn" id="pt-services" data-panel="services" title="Services">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="9" height="9" rx="1"/><rect x="13" y="3" width="9" height="9" rx="1"/>
          <rect x="2" y="13" width="9" height="9" rx="1"/><rect x="13" y="13" width="9" height="9" rx="1"/>
        </svg>
      </button>
    </div>
    <div class="header-sep"></div>
    <div class="header-stat">
      <span class="header-stat-label">HOST</span>
      <span class="header-stat-val">numa_01</span>
    </div>
    <div class="header-sep"></div>
    <div class="header-stat">
      <span class="header-stat-label">UPTIME</span>
      <span class="header-stat-val" id="h-uptime">—</span>
    </div>
    <div class="header-sep"></div>
    <div class="header-stat">
      <span class="ws-dot" id="ws-dot"></span>
      <span class="ws-label" id="ws-label">Connecting</span>
    </div>
    <div class="header-spacer"></div>
    <div id="server-controls" style="display:contents">
      <div class="time-range" id="time-range-controls">
        <button class="tr-btn active" data-pts="60"   onclick="setTimeWindow(60)">2m</button>
        <button class="tr-btn"        data-pts="300"  onclick="setTimeWindow(300)">10m</button>
        <button class="tr-btn"        data-pts="900"  onclick="setTimeWindow(900)">30m</button>
        <button class="tr-btn"        data-pts="1800" onclick="setTimeWindow(1800)">1h</button>
      </div>
      <div class="header-sep"></div>
      <button class="btn-fit" onclick="panzoom.fitServer()" title="全体表示">⊡</button>
      <div class="header-sep"></div>
    </div>
    <div id="clock">—</div>
    <div class="header-sep"></div>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>

  <!-- Content area (server canvas + services panel) -->
  <div id="content">

  <!-- Canvas viewport (server panel) -->
  <div id="viewport">
    <div id="canvas">

      <!-- ── Row 1: CPU | GPU | RAM | Load ── -->

      <!-- CPU tile: left=0, top=0, w=310, h=260 -->
      <div class="tile" style="left:0;top:0;width:310px;height:260px">
        <div class="card">
          <div class="card-title">CPU</div>
          <div class="metric-body">
            <div class="metric-gauge">
              <svg class="gauge-svg" viewBox="0 0 160 100">
                <path class="gauge-track"     d="M 15 88 A 65 65 0 0 1 145 88"/>
                <path class="gauge-indicator" d="M 15 88 A 65 65 0 0 1 145 88" id="cpu-gauge" stroke="var(--blue)" stroke-dasharray="0 204.2"/>
              </svg>
              <div class="gauge-center-text">
                <div class="gauge-pct" id="cpu-pct">—</div>
                <div class="gauge-sub">USAGE</div>
              </div>
            </div>
            <div class="metric-chart"><canvas id="cpu-chart"></canvas></div>
          </div>
          <div class="core-grid" id="cpu-cores"></div>
          <div class="metric-meta">
            <div class="meta-pill">🌡 <span id="cpu-temp">—</span></div>
            <div class="meta-pill">⚡ <span id="cpu-pow">—</span></div>
          </div>
        </div>
      </div>

      <!-- GPU tile: left=322, top=0, w=388, h=260 (populated by JS) -->
      <div class="tile" id="tile-gpu" style="left:322px;top:0;width:388px;height:260px"></div>

      <!-- RAM tile: left=722, top=0, w=310, h=260 -->
      <div class="tile" style="left:722px;top:0;width:310px;height:260px">
        <div class="card" id="ram-card">
          <div class="card-title">RAM</div>
          <div class="metric-body">
            <div class="metric-gauge">
              <svg class="gauge-svg" viewBox="0 0 160 100">
                <path class="gauge-track"     d="M 15 88 A 65 65 0 0 1 145 88"/>
                <path class="gauge-indicator" d="M 15 88 A 65 65 0 0 1 145 88" id="ram-gauge" stroke="var(--green)" stroke-dasharray="0 204.2"/>
              </svg>
              <div class="gauge-center-text">
                <div class="gauge-pct" id="ram-pct">—</div>
                <div class="gauge-sub">USED</div>
              </div>
            </div>
            <div class="metric-chart"><canvas id="ram-chart"></canvas></div>
          </div>
          <div class="metric-meta">
            <div class="meta-pill">Used <span id="ram-used">—</span></div>
            <div class="meta-pill">Cache <span id="ram-cached">—</span></div>
            <div class="meta-pill">Swap <span id="ram-swap">—</span></div>
          </div>
        </div>
      </div>

      <!-- Load tile: left=1044, top=0, w=224, h=260 -->
      <div class="tile" style="left:1044px;top:0;width:224px;height:260px">
        <div class="card">
          <div class="card-title">LOAD AVG</div>
          <div class="load-grid">
            <div class="load-row">
              <span class="load-label">1 min</span>
              <span class="load-val" id="load-1">—</span>
            </div>
            <div class="load-row">
              <span class="load-label">5 min</span>
              <span class="load-val" id="load-5">—</span>
            </div>
            <div class="load-row">
              <span class="load-label">15 min</span>
              <span class="load-val" id="load-15">—</span>
            </div>
            <div class="load-divider"></div>
            <div class="load-row">
              <span class="load-label">Processes</span>
              <span class="load-val" style="font-size:13px" id="proc-count">—</span>
            </div>
          </div>
        </div>
      </div>

      <!-- ── Row 2: Network | Disk | Power ── -->

      <!-- Network tile: left=0, top=272, w=460, h=280 -->
      <div class="tile" style="left:0;top:272px;width:460px;height:280px">
        <div class="card">
          <div class="card-title">NETWORK &mdash; <span id="net-iface" style="text-transform:none;font-weight:400;color:var(--text)">—</span></div>
          <div class="net-chart-wrap"><canvas id="net-chart"></canvas></div>
          <div class="net-stats">
            <div class="net-stat">
              <span class="dot dot-rx"></span>
              <span class="net-val" style="color:var(--blue)" id="rx-val">—</span>
              <span class="net-label">↓ RX</span>
            </div>
            <div class="net-stat">
              <span class="dot dot-tx"></span>
              <span class="net-val" style="color:var(--purple)" id="tx-val">—</span>
              <span class="net-label">↑ TX</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Disk tile: left=472, top=272, w=290, h=280 -->
      <div class="tile" style="left:472px;top:272px;width:290px;height:280px">
        <div class="card">
          <div class="card-title">DISK</div>
          <div class="disk-donut-wrap">
            <canvas id="disk-chart"></canvas>
            <div class="disk-donut-center">
              <div class="disk-donut-pct" id="disk-pct-text">—</div>
              <div class="disk-donut-sub">USED</div>
            </div>
          </div>
          <div class="disk-legend" id="disk-legend"></div>
          <div class="disk-io-chart-wrap"><canvas id="disk-io-chart"></canvas></div>
          <div class="disk-io">
            <span class="disk-io-item"><span style="color:var(--blue)">↓</span> R <span id="disk-rx">—</span></span>
            <span class="disk-io-item"><span style="color:var(--amber)">↑</span> W <span id="disk-wx">—</span></span>
          </div>
        </div>
      </div>

      <!-- Power tile: left=774, top=272, w=258, h=280 -->
      <div class="tile" style="left:774px;top:272px;width:258px;height:280px">
        <div class="card">
          <div class="card-title">POWER</div>
          <div class="power-total" id="pow-total">—</div>
          <div class="power-chart-wrap"><canvas id="power-chart"></canvas></div>
          <div class="power-legend">
            <div class="power-legend-item">
              <span class="power-legend-dot" style="background:#3b82f6"></span>
              <span class="power-legend-label">CPU</span>
              <span class="power-legend-val" id="pow-cpu">—</span>
            </div>
            <div class="power-legend-item">
              <span class="power-legend-dot" style="background:#f59e0b"></span>
              <span class="power-legend-label">GPU</span>
              <span class="power-legend-val" id="pow-gpu">—</span>
            </div>
            <div class="power-legend-item">
              <span class="power-legend-dot" style="background:#818cf8"></span>
              <span class="power-legend-label">DRAM</span>
              <span class="power-legend-val" id="pow-dram">—</span>
            </div>
          </div>
        </div>
      </div>

    </div><!-- /#canvas -->
  </div><!-- /#viewport -->

  <!-- Services panel (separate, not on canvas) -->
  <div id="panel-services">
    <div class="svc-grid" id="svc-grid">
      <div style="color:var(--dim);font-size:12px;padding:8px">Loading...</div>
    </div>
    <div id="svc-log-drawer" style="display:none">
      <div class="svc-log-drawer-hdr">
        <span class="svc-log-drawer-title" id="svc-log-drawer-title">LOGS</span>
        <button class="svc-log-close" onclick="closeLogs()">✕</button>
      </div>
      <div class="log-view" id="svc-log-view"></div>
    </div>
  </div><!-- /#panel-services -->

  </div><!-- /#content -->

<script src="/app.js?v=13"></script>
</body>
</html>
