services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: numa-dashboard
    container_name: dashboard
    restart: always
    pid: "host"                  # Access host PID namespace for /proc metrics
    ports:
      - "127.0.0.1:8088:3000"    # localhost only — exposed to the tailnet via `tailscale serve` (not public)
    environment:
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_IPS=${ALLOWED_IPS:-}
      - SWITCHBOT_TOKEN=${SWITCHBOT_TOKEN:-}
      - SWITCHBOT_SECRET=${SWITCHBOT_SECRET:-}
      - HOME_POLL_SECONDS=${HOME_POLL_SECONDS:-90}
      - AGENT_DATA_DIR=/agent-data
      - NODE_ENV=production
    volumes:
      - /sys:/sys:ro                                                                           # CPU temp, hwmon fan sensors
      - /sys/devices/virtual/powercap/intel-rapl:/host-rapl:ro                               # RAPL at non-masked path (Docker masks /sys/devices/virtual/powercap)
      - /var/run/docker.sock:/var/run/docker.sock:ro                                          # Docker stats & logs
      - ./data:/app/data                                                                      # Persistent metrics history
      - ../proxy/data/logs:/npm-logs:ro                                                       # NPM access logs for web tracking
      - ../agent/data:/agent-data:ro                                                          # Agent run history (runs.jsonl) for the AGENT panel (#72)
    cap_add:
      - SYS_RAWIO   # Intel RAPL powercap access
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - proxy_net

networks:
  proxy_net:
    external: true
